name: Build BetterDreamly

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  release:
    types: [ created ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build Server Phar
    runs-on: ubuntu-22.04

    steps:
      # Checkout repo
      - name: Checkout code
        uses: actions/checkout@v4

      # --- Download and setup PHP 8.1 (PMMP 4) ---
      - name: Setup PHP
        run: |
          curl -L -o php.tar.gz https://github.com/pmmp/PHP-Binaries/releases/download/pm4-php-8.1-latest/PHP-8.1-Linux-x86_64-PM4.tar.gz
          mkdir -p $HOME/php
          tar -xzf php.tar.gz -C $HOME/php

          echo "Files in PHP dir:"
          ls -R $HOME/php

          # ustaw poprawną ścieżkę (ważne!)
          echo "$HOME/php/bin" >> $GITHUB_PATH
          echo "PHP_BINARY=$HOME/php/bin/php" >> $GITHUB_ENV

      # Verify PHP
      - name: Verify PHP
        run: |
          $PHP_BINARY -v

      # --- Composer ---
      - name: Install Composer
        run: |
          curl -sS https://getcomposer.org/installer | $PHP_BINARY
          mv composer.phar /usr/local/bin/composer

      # --- Dependencies ---
      - name: Install dependencies
        run: |
          $PHP_BINARY /usr/local/bin/composer install \
            --no-dev \
            --classmap-authoritative \
            --ignore-platform-reqs

      # --- Build PHAR ---
      - name: Build server phar
        run: |
          $PHP_BINARY -dphar.readonly=0 build/server-phar.php \
            --out BetterDreamly.phar

      # --- Upload artifact ---
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: BetterDreamly-${{ github.sha }}
          path: BetterDreamly.phar
          retention-days: 30

      # --- Attach to release ---
      - name: Attach to release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: BetterDreamly.phar
