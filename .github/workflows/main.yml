name: Build BetterDreamly

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  release:
    types: [ created ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        run: |
          curl -L -o php.tar.gz https://github.com/pmmp/PHP-Binaries/releases/download/pm4-php-8.1-latest/PHP-8.1-Linux-x86_64-PM4.tar.gz
          mkdir -p $HOME/php
          tar -xzf php.tar.gz -C $HOME/php
          echo "$HOME/php/bin/php7/bin" >> $GITHUB_PATH
          echo "PHP_BINARY=$HOME/php/bin/php7/bin/php" >> $GITHUB_ENV

      - name: Verify PHP
        run: $PHP_BINARY -v

      - name: Install Composer
        run: |
          curl -sS https://getcomposer.org/installer | $PHP_BINARY
          mv composer.phar /usr/local/bin/composer

      - name: Fix composer
        run: |
          rm -f composer.lock
          $PHP_BINARY /usr/local/bin/composer update --no-dev --ignore-platform-reqs

      - name: Install dependencies
        run: |
          $PHP_BINARY /usr/local/bin/composer install --no-dev --classmap-authoritative --ignore-platform-reqs

      - name: Build server phar
        run: |
          $PHP_BINARY -dphar.readonly=0 build/server-phar.php --out BetterDreamly.phar

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: BetterDreamly-${{ github.sha }}
          path: BetterDreamly.phar
          retention-days: 30

      - name: Attach to release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: BetterDreamly.phar
